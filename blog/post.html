<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Sealing Blog</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="../assets/js/site.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom right, #f5f8fb, #e8eef5);
      color: #222;
      margin: 0;
      line-height: 1.8;
    }
    a.back-link {
      display: inline-flex;
      align-items: center;
      color: #1e4f9f;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      margin: 1.5rem 0 1rem 1.5rem;
      transition: color 0.3s ease;
    }
    a.back-link svg {
      margin-right: 0.4rem;
      stroke: #1e4f9f;
      stroke-width: 2;
      width: 16px;
      height: 16px;
      fill: none;
    }
    a.back-link:hover {
      color: #3a6fcf;
    }
    .banner {
      background: linear-gradient(135deg, #1e4f9f 0%, #3a6fcf 100%);
      height: 180px;
      border-bottom-left-radius: 60% 20%;
      border-bottom-right-radius: 60% 20%;
      margin-bottom: -100px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto 3rem;
      background: #fff;
      padding: 2.5rem 3rem 3rem;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(30,79,159,0.1);
      border: 1px solid #dfe4ea;
    }
    .featured-image {
      width: 100%;
      height: 420px;
      border-radius: 14px;
      object-fit: cover;
      display: block;
      margin: 1.5rem auto 2rem;
      box-shadow: 0 6px 18px rgba(30,79,159,0.1);
    }
    h1.post-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0 0 0.4rem 0;
      color: #0f1a2a;
    }
    .title-underline {
      width: 80px;
      height: 4px;
      background: #1e4f9f;
      border-radius: 2px;
      margin: 0.5rem 0 1.5rem;
    }
    .post-meta {
      font-size: 0.95rem;
      color: #3a6fcf;
      margin-bottom: 2rem;
      font-weight: 500;
    }
    #post-content {
      font-size: 1.1rem;
      color: #333;
      line-height: 1.8;
    }
    .quote-button-container {
      text-align: center;
      margin-top: 3rem;
      margin-bottom: 3rem;
    }
    .quote-button {
      background-color: #1e4f9f;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 0.85rem 3rem;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.3s ease;
      box-shadow: 0 5px 15px rgba(30,79,159,0.3);
    }
    .quote-button:hover,
    .quote-button:focus {
      background-color: #4a82f7;
      outline: none;
      box-shadow: 0 8px 20px rgba(74,130,247,0.5);
    }
  </style>
</head>
<body>
  <div data-include="header" data-src="../header.html"></div>

  <a href="../blog/index.html" class="back-link" aria-label="Back to Blog">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15 18l-6-6 6-6"/></svg>
    Back to Blog
  </a>

  <div class="banner"></div>

  <div class="container" id="post-container">
    <img src="../assets/images/blog/default.jpg" alt="Featured Image" class="featured-image" id="featured-image" />
    <h1 class="post-title" id="post-title">Loading...</h1>
    <div class="title-underline"></div>
    <div class="post-meta" id="post-meta"></div>
    <main id="post-content">Loading post...</main>
  </div>

  <div class="quote-button-container" id="quote-button-container" style="display:none;">
    <a href="../index.html#quote" class="quote-button" aria-label="Get a Quote Today">Get a Quote Today</a>
  </div>

  <div data-include="footer" data-src="../footer.html"></div>

  <script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsNpNSkvB5wvC7CKfJzOyY35zFRC9OUpKbW7EuTGWuT9hdO9ovdViIiR-ZYkAwcVtliYsSa-2-kR1-/pub?output=csv";

  // parse CSV manually
  function parseCSV(text) {
    const rows = [];
    let i=0, cell="", row=[], inQuotes=false;
    while (i < text.length) {
      const char = text[i];
      if (inQuotes) {
        if (char === '"') {
          if (text[i+1] === '"'){ cell += '"'; i+=2; continue; }
          inQuotes=false; i++; continue;
        }
        cell += char; i++; continue;
      }
      if (char === '"'){ inQuotes=true; i++; continue; }
      if (char === ','){ row.push(cell); cell=""; i++; continue; }
      if (char === '\n'){ row.push(cell); rows.push(row); cell=""; row=[]; i++; if(text[i]==='\r') i++; continue; }
      if (char === '\r'){ row.push(cell); rows.push(row); cell=""; row=[]; i++; continue; }
      cell += char; i++;
    }
    if (cell.length || row.length){ row.push(cell); rows.push(row); }
    return rows;
  }

  function formatDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
  }

  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    if (!slug) {
      document.getElementById("post-content").innerHTML = "<p style='text-align:center;color:#888;'>No post selected.</p>";
      document.getElementById("quote-button-container").style.display = "none";
      return;
    }

    try {
      const res = await fetch(SHEET_URL);
      const csv = await res.text();
      const rows = parseCSV(csv).slice(1);
      let post = rows.find(r => (r[1]||"").trim() === slug && (r[6]||"").toLowerCase() === "true");
      if (!post) throw new Error("Post not found.");
      // Remove the "published" column so "TRUE" can never be rendered
      if (post) post = post.filter((_, i) => i !== 6);

      // Columns: [title, slug, metaDesc, imageURL, ?, body, readTime] (published is removed)
      let [title, , metaDesc, imageURL, , body, , readTime] = post;
      title = title.replace(/(\bTRUE\b|\btrue\b)/gi, "").trim();
      body = body.replace(/(\bTRUE\b|\btrue\b)/gi, "").replace(/<p>\s*<\/p>/g, "").trim();
      document.title = `${title} | MC Sealing Blog`;

      // Fix Google Drive links
      let fixedImageURL = imageURL || "../assets/images/blog/default.jpg";
      if (fixedImageURL.includes("drive.google.com")) {
        const match = fixedImageURL.match(/(?:\/file\/d\/|\/d\/)([a-zA-Z0-9_-]+)/);
        if (match && match[1]) fixedImageURL = `https://lh3.googleusercontent.com/d/${match[1]}=w1200-h800-no`;
      }

      const featuredImageEl = document.getElementById("featured-image");
      featuredImageEl.src = fixedImageURL;
      featuredImageEl.alt = title;

      document.getElementById("post-title").textContent = title;

      let metaText = "";
      // We no longer have published date, only readTime remains
      if (readTime) metaText += readTime.trim();
      document.getElementById("post-meta").textContent = metaText;

      document.getElementById("post-content").innerHTML = body;

      document.getElementById("quote-button-container").style.display = "block";
    } catch (err) {
      document.getElementById("post-content").innerHTML = `<p style='text-align:center;color:#888;'>Error loading post.</p>`;
      document.getElementById("quote-button-container").style.display = "none";
      console.error(err);
    }
  }

  document.addEventListener("DOMContentLoaded", loadPost);
  </script>
</body>
</html>
